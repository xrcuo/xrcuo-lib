# ==========================================================================
# XRCUO API 配置文件
# ==========================================================================

# --------------------------------------------------------------------------
# 服务器配置
# --------------------------------------------------------------------------
server:
  # 服务监听端口
  port: ":8080"
  # Gin运行模式：debug | release | test
  mode: "debug"
  # JSON响应格式化配置
  json_format:
    # 是否启用格式化JSON响应
    enabled: false

# --------------------------------------------------------------------------
# 日志配置
# --------------------------------------------------------------------------
log:
  # 日志级别：debug | info | warn | error | fatal | panic
  level: "info"
  # 日志文件路径
  file: "logs/app.log"
  # 是否同时输出到控制台
  console_output: true
  # 是否输出请求日志
  request_log: true
  # 单个日志文件最大大小（MB）
  max_size: 10
  # 保留的日志文件数量
  max_backups: 5
  # 日志文件保留天数
  max_age: 7
  # 是否压缩旧的日志文件
  compress: true
  # 每次启动是否创建新的日志文件
  new_file_on_startup: true

# --------------------------------------------------------------------------
# 数据库配置
# --------------------------------------------------------------------------
database:
  # 数据库类型：sqlite | mysql | postgresql
  type: "sqlite"
  # SQLite 数据库文件路径（仅 SQLite 使用）
  path: "./data/stats.db"
  # 数据库主机（MySQL/PostgreSQL 使用）
  host: "localhost"
  # 数据库端口（MySQL 默认 3306，PostgreSQL 默认 5432）
  port: 3306
  # 数据库用户名（MySQL/PostgreSQL 使用）
  user: ""
  # 数据库密码（MySQL/PostgreSQL 使用）
  password: ""
  # 数据库名称（MySQL/PostgreSQL 使用）
  dbname: "xrcuo_api"
  # 最大打开连接数
  max_open_conns: 10
  # 最大空闲连接数
  max_idle_conns: 5

# --------------------------------------------------------------------------
# 限流配置
# --------------------------------------------------------------------------
rate_limit:
  # 令牌桶容量（最大突发请求数）
  capacity: 100
  # 令牌生成速率（每秒令牌数，1.666 ≈ 100次/分钟）
  rate: 1.666



# --------------------------------------------------------------------------
# 网站信息配置
# --------------------------------------------------------------------------
site:
  # 网站标题
  title: "YVLPYY｜二次元の小窝 惊喜 API"
  # 网站名称/用户名
  name: "惊喜"
  # 座右铭
  motto: "人海中遇见的人终将归还人海"
  # 头像URL
  avatar_url: "/static/favicon.ico"
  # ICP备案号
  icp: "闽ICP备2026011617号-1"
  # 版权信息
  copyright: "© 2026 YVLPYY. All rights reserved."
  # 网站链接
  links:
    # 博客链接
    blog: "/"
    # CDK兑换链接
    cdk: "/"
    # API/统计链接
    api: "/docs/"
    # 关于页面链接
    about: "/"
  # 联系方式
  contact:
    # GitHub链接
    github: "https://github.com/xrcuo"
    # 知乎链接
    zhihu: "https://www.zhihu.com/"
    # 微博链接
    weibo: "https://weibo.com/"
    # 邮箱链接
    email: "https://mail.qq.com/"
