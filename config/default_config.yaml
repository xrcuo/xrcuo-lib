# 服务器配置
server:
  port: ":8080"  # 服务监听端口
  mode: "debug"  # Gin运行模式（debug, release, test）
  json_format:
    enabled: false  # 是否启用格式化JSON响应（默认关闭）

# IP2Region配置
ip2region:
  v4_db_path: "./data/ip2region_v4.xdb"  # IPv4数据库路径
  v6_db_path: "./data/ip2region_v6.xdb"  # IPv6数据库路径

# 日志配置
log:
  level: "info"  # 日志级别（debug, info, warn, error）
  file: "logs/app.log"  # 日志文件路径
  console_output: true  # 是否输出到控制台
  request_log: true  # 是否输出请求日志
  max_size: 10  # 单个日志文件最大大小（MB）
  max_backups: 5  # 保留的日志文件数量
  max_age: 7  # 日志文件保留天数
  compress: true  # 是否压缩旧的日志文件
  new_file_on_startup: true  # 每次启动是否创建新的日志文件

# 数据库配置
database:
  type: "sqlite"  # 数据库类型：sqlite, mysql, postgresql
  path: "./data/stats.db"  # SQLite数据库文件路径（仅sqlite使用）
  host: "localhost"  # 数据库主机（mysql/postgresql使用）
  port: 3306  # 数据库端口（mysql默认3306，postgresql默认5432）
  user: ""  # 数据库用户名（mysql/postgresql使用）
  password: ""  # 数据库密码（mysql/postgresql使用）
  dbname: "xrcuo_api"  # 数据库名称（mysql/postgresql使用）
  max_open_conns: 10  # 最大打开连接数
  max_idle_conns: 5  # 最大空闲连接数

rate_limit:
  capacity: 100    # 令牌桶容量（最大突发请求数）
  rate:  1.666         # 令牌生成速率（每秒令牌数）

# 随机图片配置
random_image:
  local_enabled: false  # 是否启用本地随机图片
  local_path: "./data/images"  # 本地图片目录路径
  
# 网站信息配置
site:
  title: "YVLPYY｜二次元の小窝 惊喜 API"  # 网站标题
  name: "惊喜"  # 网站名称/用户名
  motto: "人海中遇见的人终将归还人海"  # 座右铭
  avatar_url: "/static/favicon.ico"  # 头像URL
  icp: "闽ICP备2026011617号-1"  # ICP备案号
  copyright: "© 2026 YVLPYY. All rights reserved."  # 版权信息
  links:
    blog: "/"  # 博客链接
    cdk: "/"  # CDK兑换链接
    api: "/docs/"  # API/统计链接
    about: "/"  # 关于页面链接
  contact:
    github: "https://github.com/xrcuo"  # GitHub链接
    zhihu: "https://www.zhihu.com/"  # 知乎链接
    weibo: "https://weibo.com/"  # 微博链接
    email: "https://mail.qq.com/"  # 邮箱链接
